[phases.setup]
nixPkgs = ["python311", "gcc", "postgresql", "ffmpeg", "chromium", "chromedriver"]
nixLibs = ["zlib"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "export CHROMEDRIVER_PATH=$(which chromedriver 2>/dev/null) && export CHROMIUM_BIN=$(which chromium 2>/dev/null) && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
